name: Playwright Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: ${{ matrix.project }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      # Each project runs on its own runner → its own source IP → its own
      # /api/auth rate-limit budget (40 / 900s).
      matrix:
        project: [api, e2e-chromium, e2e-firefox, e2e-webkit]

    env:
      BASE_URL: ${{ vars.BASE_URL || 'https://qa-a.recruitment.mediamarslab.com' }}
      X_ACCESS_KEY: ${{ secrets.X_ACCESS_KEY }}
      ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
      ANALYTICS_BASIC_USER: ${{ vars.ANALYTICS_BASIC_USER || 'QA_USER' }}
      ANALYTICS_BASIC_PASSWORD: ${{ secrets.ANALYTICS_BASIC_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run ${{ matrix.project }} tests
        run: npx playwright test --project=${{ matrix.project }}

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.project }}
          path: playwright-report/
          retention-days: 14

      - name: Upload Allure results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.project }}
          path: allure-results/
          retention-days: 14

  allure-report:
    name: Publish Allure report to GitHub Pages
    needs: test
    # Publish even if some tests failed (the report shows them), but not for PRs.
    if: ${{ !cancelled() && github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm ci

      - name: Download all Allure results
        uses: actions/download-artifact@v4
        with:
          pattern: allure-results-*
          path: allure-raw
          merge-multiple: true

      - name: Restore Allure history (best effort, enables trends across runs)
        run: |
          mkdir -p allure-raw/history
          base="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/history"
          for f in history.json history-trend.json categories-trend.json duration-trend.json retry-trend.json; do
            curl -fsSL "$base/$f" -o "allure-raw/history/$f" || true
          done

      - name: Generate Allure HTML report
        run: npx allure generate allure-raw --clean -o allure-report

      - name: Upload Allure report (downloadable artifact)
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/
          retention-days: 14

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
